  <script>
    // Generate evenly spaced circle positions using trigonometry
    // 7 circles at 360/7 ≈ 51.43 degrees apart, starting from top (270 degrees in math coords)
    function circlePositions(count, outerRadius, startAngleDeg) {
      const positions = [];
      const step = 360 / count;
      for (let i = 0; i < count; i++) {
        const angleDeg = startAngleDeg + i * step;
        const angleRad = (angleDeg * Math.PI) / 180;
        positions.push({
          x: Math.round(Math.cos(angleRad) * outerRadius * 10) / 10,
          y: Math.round(Math.sin(angleRad) * outerRadius * 10) / 10,
        });
      }
      return positions;
    }
    // Log for reference
    const pos = circlePositions(7, 120, -90);
    console.log("Circle positions:", pos);
    // Expected: top center, then clockwise
